<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Grid Container Example</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .grid{display:grid;grid-template-columns:200px 1fr;gap:10px}
    nav{background:#f7f7f7;padding:12px}
    main{background:#fff;padding:12px}
  </style>
</head>
<body>

<h1>Grid Container Example</h1>
<div class="grid"><nav>Sidebar</nav><main>Main content area</main></div>
<p>The grid container establishes columns and rows for children.</p>

</body>
</html>
