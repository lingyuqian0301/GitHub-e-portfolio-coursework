<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
h1.a {
  text-shadow: 4px 4px;
}
h1.b {
  text-shadow: 2px 2px blue;
}
h1.c {
  text-shadow: 2px 2px 5px yellow;
}
h1.d {
  color: wheat;
  text-shadow: 2px 2px 4px #000000;
}
h1.e {
  text-shadow: 0 0 5px #FF0000;
}
h1.f {
  text-shadow: 0 0 3px #FF0000, 0 0 4px #0000FF;
}
h1.g {
  color: lightblue;
  text-shadow: 1px 1px 3px navy, 0 0 25px blue, 0 0 5px darkblue;
}
h1.h {
  color: orange;
  text-shadow: -1px 0 black, 0 1px black, 1px 0 black, 0 -1px black;
}
</style>
</head>
<body>

<h1 class="a">Text-shadow effect!</h1>
<h1 class="b">Text-shadow effect!</h1>
<h1 class="c">Text-shadow effect!</h1>
<h1 class="d">Text-shadow effect!</h1>
<h1 class="e">Text-shadow with red neon glow!</h1>
<h1 class="f">Text-shadow with red and blue neon glow!</h1>
<h1 class="g">Text-shadow effect!</h1>
<h1 class="h">Border around text!</h1>

<p><a href="index.html">Back</a></p>

</body>
</html>
