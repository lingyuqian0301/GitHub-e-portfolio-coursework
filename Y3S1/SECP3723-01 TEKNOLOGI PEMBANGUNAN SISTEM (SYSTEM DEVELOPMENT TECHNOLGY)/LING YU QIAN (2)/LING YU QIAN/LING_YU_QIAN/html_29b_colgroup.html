<!DOCTYPE html>
<html>
<body>

<h1>Colgroup B: Per-column Styling</h1>

<style>
  table.demo { border-collapse: collapse; }
  table.demo th, table.demo td { border:1px solid #ccc; padding:6px; }
</style>

<table class="demo">
  <colgroup>
    <col style="width: 30%;">
    <col style="width: 70%; background:#f5f5f5;">
  </colgroup>
  <tr><th>Label</th><th>Value</th></tr>
  <tr><td>Name</td><td>Anya</td></tr>
  <tr><td>Team</td><td>Market</td></tr>
</table>

<br><br><a href="index.html">Back to Main Page</a>
</body>
</html>
