<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
ol {
  counter-reset: section;
  list-style-type: none;
}

li::before {
  counter-increment: section;
  content: counters(section,".") " ";
}
</style>
</head>
<body>

<ol>
  <li>item1</li>
  <li>item2   
  <ol>
    <li>item3</li>
    <li>item4</li>
    <li>item5
    <ol>
      <li>item6</li>
      <li>item7</li>
      <li>item8</li>
    </ol>
    </li>
    <li>item9</li>
  </ol>
  </li>
  <li>item10</li>
  <li>item11</li>
</ol>

<ol>
  <li>item12</li>
  <li>item13</li>
</ol>

<p><a href="index.html">Back</a></p>

</body>
</html>
