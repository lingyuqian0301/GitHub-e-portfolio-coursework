<!DOCTYPE html>
<html>
<head>
<title>JS String Reference</title>
</head>
<body>

<h1>JS String Reference</h1>
<p>JavaScript string methods reference examples.</p>

<p id="demo"></p>

<script>
let str = "Hello World";

document.getElementById("demo").innerHTML = 
    "String: " + str + "<br>" +
    "Length: " + str.length + "<br>" +
    "charAt(0): " + str.charAt(0) + "<br>" +
    "substring(0, 5): " + str.substring(0, 5) + "<br>" +
    "slice(0, 5): " + str.slice(0, 5) + "<br>" +
    "toUpperCase(): " + str.toUpperCase();
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
