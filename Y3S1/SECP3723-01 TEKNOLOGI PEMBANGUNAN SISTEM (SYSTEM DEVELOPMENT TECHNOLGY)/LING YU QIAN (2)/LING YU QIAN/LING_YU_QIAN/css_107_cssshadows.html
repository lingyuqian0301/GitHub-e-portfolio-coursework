<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Shadows</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .box{width:220px;height:80px;background:#fff;border:1px solid #eee;padding:12px}
    .shadow{text-shadow:2px 2px 4px rgba(0,0,0,0.3);font-size:20px}
  </style>
</head>
<body>

<h1>CSS Shadows</h1>
<div class="box shadow">Text with shadow</div>
<p>Shadows add depth to text and elements via <code>text-shadow</code> and <code>box-shadow</code>.</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
