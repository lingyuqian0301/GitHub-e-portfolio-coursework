<div style="text-align:center"> 
  <button onclick="playPause()">Play/Pause</button> 
  <button onclick="makeBig()">Big</button>
  <button onclick="makeSmall()">Small</button>
  <button onclick="makeNormal()">Normal</button>
  <br><br>
  <video id="video" width="420">
    <source src="videos/sunset.mp4" type="video/mp4">
    Your browser does not support HTML video.
  </video>
</div> 

<script> 
var newVideo = document.getElementById("video"); 

function playPause() { 
  if (newVideo.paused) 
    newVideo.play(); 
  else 
    newVideo.pause(); 
} 

function makeBig() { 
    newVideo.width = 560; 
} 

function makeSmall() { 
    newVideo.width = 320; 
} 

function makeNormal() { 
    newVideo.width = 420; 
} 
</script>
