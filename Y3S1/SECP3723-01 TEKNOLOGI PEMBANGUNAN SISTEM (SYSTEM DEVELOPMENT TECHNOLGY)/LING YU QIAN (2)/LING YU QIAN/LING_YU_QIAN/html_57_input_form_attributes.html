<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <title>Input Form Attributes</title>
</head>
<body>

<h1>Input Form Attributes</h1>

<p>Attributes you often add to &lt;input&gt; elements:</p>
<ul>
  <li><code>name</code> — key sent to the server</li>
  <li><code>value</code> — current value</li>
  <li><code>disabled</code> — not editable</li>
  <li><code>readonly</code> — visible but not editable</li>
  <li><code>autofocus</code> — gives focus on page load</li>
</ul>

<form>
  <label>Promo code: <input name="promo" value="WELCOME" readonly></label><br>
  <label>Search: <input name="q" autofocus></label>
</form>

<br><br><a href="index.html">Main Page</a>

</body>
</html>
