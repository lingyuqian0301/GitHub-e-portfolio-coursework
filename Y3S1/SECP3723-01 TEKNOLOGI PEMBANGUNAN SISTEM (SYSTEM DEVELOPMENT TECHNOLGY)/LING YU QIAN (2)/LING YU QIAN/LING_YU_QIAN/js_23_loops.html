<!DOCTYPE html>
<html>
<head>
<title>JS Loops</title>
</head>
<body>

<h1>JS Loops</h1>
<p>Loops can execute a block of code a number of times.</p>

<p id="demo"></p>

<script>
let text = "";
for (let i = 0; i < 5; i++) {
    text += "The number is " + i + "<br>";
}
document.getElementById("demo").innerHTML = text;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
