<!DOCTYPE html>
<html>
<head>
<title>JS BigInt</title>
</head>
<body>

<h1>JS BigInt</h1>
<p>JavaScript BigInt is a new datatype that can represent integers with arbitrary precision.</p>

<p id="demo"></p>

<script>
let x = BigInt("123456789012345678901234567890");
let y = 9007199254740991n;

document.getElementById("demo").innerHTML = 
    "x = " + x + "<br>" +
    "y = " + y + "<br>" +
    "x + y = " + (x + y);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
