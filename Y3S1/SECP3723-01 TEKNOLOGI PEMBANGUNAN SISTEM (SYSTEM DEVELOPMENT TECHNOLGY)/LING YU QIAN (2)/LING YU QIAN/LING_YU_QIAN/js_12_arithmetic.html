<!DOCTYPE html>
<html>
<head>
<title>JS Arithmetic</title>
</head>
<body>

<h1>JS Arithmetic</h1>
<p>JavaScript arithmetic operators perform arithmetic on numbers (literals or variables).</p>

<p id="demo"></p>

<script>
let a = 10;
let b = 3;

document.getElementById("demo").innerHTML = 
    "a = " + a + ", b = " + b + "<br>" +
    "a + b = " + (a + b) + "<br>" +
    "a - b = " + (a - b) + "<br>" +
    "a * b = " + (a * b) + "<br>" +
    "a / b = " + (a / b) + "<br>" +
    "a % b = " + (a % b) + "<br>" +
    "a ** b = " + (a ** b);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
