<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Dropdowns</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .dropdown{position:relative;display:inline-block}
    .drop-btn{background:#2196F3;color:#fff;padding:8px;border-radius:4px;text-decoration:none}
    .menu{display:none;position:absolute;background:#fff;border:1px solid #ddd;padding:8px;margin-top:6px}
    .dropdown:hover .menu{display:block}
  </style>
</head>
<body>

<h1>CSS Dropdowns</h1>
<div class="dropdown">
  <a class="drop-btn" href="#">Menu</a>
  <div class="menu"><a href="#">Item 1</a><br><a href="#">Item 2</a></div>
</div>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
