<!DOCTYPE html>
<html>
<head>
<title>JS Hoisting</title>
</head>
<body>

<h1>JS Hoisting</h1>
<p>Hoisting is JavaScript's default behavior of moving declarations to the top.</p>

<p id="demo"></p>

<script>
x = 5; // Assign 5 to x
document.getElementById("demo").innerHTML = x; // Display x
var x; // Declare x
</script>

</body>
</html>
