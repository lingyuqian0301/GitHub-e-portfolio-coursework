<!DOCTYPE html>
<html>
<head>
<title>JS Data Types</title>
</head>
<body>

<h1>JS Data Types</h1>
<p>JavaScript variables can hold different data types: numbers, strings, objects and more.</p>

<p id="demo"></p>

<script>
let length = 16;                    // Number
let lastName = "Johnson";           // String
let x = {firstName:"John", lastName:"Doe"};  // Object

document.getElementById("demo").innerHTML = 
    typeof(length) + " " + length + "<br>" +
    typeof(lastName) + " " + lastName + "<br>" +
    typeof(x) + " " + x.firstName;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
