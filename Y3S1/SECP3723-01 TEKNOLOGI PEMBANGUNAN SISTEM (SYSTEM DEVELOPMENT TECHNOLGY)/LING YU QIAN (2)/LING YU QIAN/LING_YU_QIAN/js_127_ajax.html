<!DOCTYPE html>
<html>
<head>
<title>JS AJAX</title>
</head>
<body>

<h1>JS AJAX</h1>
<p>AJAX = Asynchronous JavaScript And XML. AJAX is not a programming language.</p>

<p id="demo"></p>

<button type="button" onclick="loadDoc()">Change Content</button>

<script>
function loadDoc() {
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
        document.getElementById("demo").innerHTML = this.responseText;
    }
    xhttp.open("GET", "ajax_info.txt", true);
    xhttp.send();
}
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
