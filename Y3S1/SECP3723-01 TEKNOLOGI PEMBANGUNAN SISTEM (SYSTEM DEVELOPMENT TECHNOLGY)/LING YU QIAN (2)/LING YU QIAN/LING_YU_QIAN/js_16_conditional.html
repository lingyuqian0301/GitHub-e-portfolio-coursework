<!DOCTYPE html>
<html>
<head>
<title>JS Conditional</title>
</head>
<body>

<h1>JS Conditional</h1>
<p>Conditional statements control the flow of execution in JavaScript.</p>

<p id="demo"></p>

<script>
let age = 18;
let status;

if (age >= 18) {
    status = "Adult";
} else {
    status = "Minor";
}

document.getElementById("demo").innerHTML = "Age: " + age + "<br>Status: " + status;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
