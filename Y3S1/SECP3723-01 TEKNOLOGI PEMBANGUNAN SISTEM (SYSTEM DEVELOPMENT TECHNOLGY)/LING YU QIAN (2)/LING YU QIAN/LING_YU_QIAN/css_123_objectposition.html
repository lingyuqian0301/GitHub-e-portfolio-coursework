<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS object-position</title>
  <style>
    .box{width:280px;height:140px;border:1px solid #ddd;overflow:hidden}
    .box img{width:100%;height:100%;object-fit:cover}
    .left img{object-position:left}
    .center img{object-position:center}
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
  </style>
</head>
<body>

<h1>CSS object-position</h1>
<div class="box left"><img src="images/pic_trulli.jpg" alt="left"></div>
<div class="box center" style="margin-top:8px"><img src="images/pic_trulli.jpg" alt="center"></div>
<p><code>object-position</code> adjusts the alignment of replaced content inside its box.</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
