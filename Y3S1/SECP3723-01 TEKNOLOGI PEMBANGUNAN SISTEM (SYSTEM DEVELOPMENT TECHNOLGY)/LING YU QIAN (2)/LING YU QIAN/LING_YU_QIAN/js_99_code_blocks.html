<body>

<h1>JS Code Blocks</h1>
<p>JavaScript statements can be grouped together in code blocks, inside curly brackets {...}.</p>

<p id="demo"></p>

<script>
{
    let x = 2;
    let y = 3;
    let z = x + y;
    document.getElementById("demo").innerHTML = z;
}
</script>
