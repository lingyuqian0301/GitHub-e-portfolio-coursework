<!DOCTYPE html>
<html>
<head>
<title>JS Maps</title>
</head>
<body>

<h1>JS Maps</h1>
<p>A Map holds key-value pairs where the keys can be any datatype.</p>

<p id="demo"></p>

<script>
const fruits = new Map([
    ["apples", 500],
    ["bananas", 300],
    ["oranges", 200]
]);

document.getElementById("demo").innerHTML = 
    "Apples: " + fruits.get("apples") + "<br>" +
    "Size: " + fruits.size;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
