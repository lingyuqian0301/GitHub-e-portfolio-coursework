<!DOCTYPE html>
<html>
<head>
<title>JS Array Methods</title>
</head>
<body>

<h1>JS Array Methods</h1>
<p>JavaScript has many array methods to work with arrays.</p>

<p id="demo"></p>

<script>
const fruits = ["Banana", "Orange", "Apple", "Mango"];

document.getElementById("demo").innerHTML = 
    "Original: " + fruits + "<br>" +
    "toString(): " + fruits.toString() + "<br>" +
    "join(' * '): " + fruits.join(" * ") + "<br>" +
    "pop(): " + fruits.pop() + "<br>" +
    "push('Kiwi'): " + fruits.push("Kiwi");
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
