<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS !important</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    p{color:blue}
    .override p{color:red !important}
  </style>
</head>
<body>

<h1>CSS !important</h1>
<p>Use <code>!important</code> to force a rule to win (use sparingly).</p>
<div><p>Normal blue text</p></div>
<div class="override"><p>Red text (overrides other rules)</p></div>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
