<!DOCTYPE html>
<html>
<head>
<title>AJAX Database</title>
</head>
<body>

<h1>AJAX Database</h1>
<p>AJAX can be used to interact with databases.</p>

<p id="demo"></p>

<button type="button" onclick="loadDoc()">Get database data</button>

<script>
function loadDoc() {
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
        document.getElementById("demo").innerHTML = this.responseText;
    }
    xhttp.open("GET", "getcustomer.php", true);
    xhttp.send();
}
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
