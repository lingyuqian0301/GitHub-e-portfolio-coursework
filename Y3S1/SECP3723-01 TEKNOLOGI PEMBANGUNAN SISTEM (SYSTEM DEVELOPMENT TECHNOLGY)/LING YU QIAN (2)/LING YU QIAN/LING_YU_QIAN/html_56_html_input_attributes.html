<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Input Attributes</title>
</head>
<body>

<h1>HTML Input Attributes</h1>

<form>
  <label>Username: <input type="text" name="user" placeholder="your name" required maxlength="20"></label><br>
  <label>Age: <input type="number" name="age" min="0" max="120" value="25"></label><br>
  <label>Website: <input type="url" name="site" autocomplete="on"></label><br>
  <label>Pattern (2 letters): <input type="text" pattern="[A-Za-z]{2}" title="Two letters"></label>
</form>

<br><br><a href="index.html">Main Page</a>

</body>
</html>
