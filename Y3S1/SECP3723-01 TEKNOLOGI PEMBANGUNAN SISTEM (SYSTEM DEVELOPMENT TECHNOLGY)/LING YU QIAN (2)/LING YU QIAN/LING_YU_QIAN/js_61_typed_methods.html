<!DOCTYPE html>
<html>
<head>
<title>JS Typed Methods</title>
</head>
<body>

<h1>JS Typed Methods</h1>
<p>Typed arrays have methods similar to regular arrays.</p>

<p id="demo"></p>

<script>
const buffer = new ArrayBuffer(16);
const int32View = new Int32Array(buffer);

int32View[0] = 42;
int32View[1] = 10;

document.getElementById("demo").innerHTML = 
    "Length: " + int32View.length + "<br>" +
    "int32View[0]: " + int32View[0] + "<br>" +
    "int32View[1]: " + int32View[1];
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
