<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
body {
  counter-reset: section;
}

h2::before {
  counter-increment: section;
  content: "Section " counter(section) ": ";
}
</style>
</head>
<body>

<h1>Using CSS Counters</h1>

<h2>HTML</h2>
<h2>CSS</h2>
<h2>JavaScript</h2>
<h2>PHP</h2>
<h2>Bootstrap</h2>

<p><a href="index.html">Back</a></p>

</body>
</html>
