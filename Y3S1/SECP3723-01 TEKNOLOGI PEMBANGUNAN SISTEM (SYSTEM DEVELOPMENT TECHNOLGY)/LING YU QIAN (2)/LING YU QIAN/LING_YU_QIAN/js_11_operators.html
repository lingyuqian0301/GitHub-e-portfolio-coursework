<!DOCTYPE html>
<html>
<head>
<title>JS Operators</title>
</head>
<body>

<h1>JS Operators</h1>
<p>JavaScript uses arithmetic operators to compute values.</p>

<p id="demo"></p>

<script>
let x = 5;
let y = 2;

document.getElementById("demo").innerHTML = 
    "x = " + x + ", y = " + y + "<br>" +
    "x + y = " + (x + y) + "<br>" +
    "x - y = " + (x - y) + "<br>" +
    "x * y = " + (x * y) + "<br>" +
    "x / y = " + (x / y) + "<br>" +
    "x % y = " + (x % y);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
