<!DOCTYPE html>
<html lang="en-US">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin: 25px;
  font-family: Arial, Helvetica, sans-serif;
}

.hero-image {
  background: url(https://i.pinimg.com/originals/74/77/41/747741f8e7dff2532734e211c0be982a.png) no-repeat center; 
  background-size: cover;
  height: 600px;
  position: relative;
}

.hero-text {
  text-align: center;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
}
</style>
</head>
<body>

<div class="hero-image">
  <div class="hero-text">
    <h1 style="font-size:55px">I am Ling</h1>
    <h3>And I'm a Creative Photographer</h3>
    <button>Contact me</button>
  </div>
</div>

<p>Know more about me!</p>
<p>Note that this technique will also make the image responsive: Resize the browser window to see the effect.</p>

<p><a href="index.html">Back</a></p>

</body>
</html>
