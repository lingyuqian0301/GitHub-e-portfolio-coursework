<!DOCTYPE html>

<title>JS Number Properties</title>
</head>
<body>

<h1>JS Number Properties</h1>
<p>JavaScript number properties are constants that belong to the Number object.</p>

<p id="demo"></p>

<script>
document.getElementById("demo").innerHTML = 
    "Number.MAX_VALUE: " + Number.MAX_VALUE + "<br>" +
    "Number.MIN_VALUE: " + Number.MIN_VALUE + "<br>" +
    "Number.POSITIVE_INFINITY: " + Number.POSITIVE_INFINITY + "<br>" +
    "Number.NEGATIVE_INFINITY: " + Number.NEGATIVE_INFINITY + "<br>" +
    "Number.NaN: " + Number.NaN;
</script>

</body>
