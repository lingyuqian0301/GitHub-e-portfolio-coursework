<!DOCTYPE html>
<html>
<head>
<title>JS Number Reference</title>
</head>
<body>

<h1>JS Number Reference</h1>
<p>JavaScript number methods and properties reference.</p>

<p id="demo"></p>

<script>
let num = 123.456;

document.getElementById("demo").innerHTML = 
    "Number: " + num + "<br>" +
    "toFixed(2): " + num.toFixed(2) + "<br>" +
    "toPrecision(4): " + num.toPrecision(4) + "<br>" +
    "toString(): " + num.toString() + "<br>" +
    "parseInt('123'): " + parseInt("123") + "<br>" +
    "parseFloat('123.45'): " + parseFloat("123.45");
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
