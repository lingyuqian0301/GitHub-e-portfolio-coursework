<h1>HTML Quotations A: q and blockquote</h1>

<h2>Short Quotes</h2>
<p>Use <code>&lt;q&gt;</code> for short inline quotations: <q>Inline quoted text.</q></p>

<h2>Block Quotes</h2>
<blockquote cite="https://www.w3.org/">
  Blockquotes are used for longer quotations and can include a cite attribute.
</blockquote>
