<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Z-index</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .base{width:200px;height:80px;background:#f4f4f4;border:1px solid #ddd;position:relative}
    .front{position:absolute;left:40px;top:10px;width:100px;height:50px;background:#ff6f61;color:#fff;z-index:2}
    .back{position:absolute;left:20px;top:30px;width:120px;height:60px;background:#6fb3ff;color:#fff;z-index:1}
  </style>
</head>
<body>

<h1>CSS Z-index</h1>
<p>Z-index sets the stack order of positioned elements (higher values are on top).</p>
<div class="base">
  <div class="back">Back (z-index:1)</div>
  <div class="front">Front (z-index:2)</div>
</div>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
