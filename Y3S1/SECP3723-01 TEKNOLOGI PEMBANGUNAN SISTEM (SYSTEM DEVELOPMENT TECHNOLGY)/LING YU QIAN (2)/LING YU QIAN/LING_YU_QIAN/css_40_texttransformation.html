<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Text Transformation</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .upper{text-transform:uppercase}
    .lower{text-transform:lowercase}
    .cap{text-transform:capitalize}
  </style>
</head>
<body>

<h1>Text Transformation</h1>
<p class="upper">uppercase example</p>
<p class="lower">LOWERCASE EXAMPLE</p>
<p class="cap">make each word capitalized</p>
<br><br><a href="index.html">Main Page</a>
</body>
</html>
