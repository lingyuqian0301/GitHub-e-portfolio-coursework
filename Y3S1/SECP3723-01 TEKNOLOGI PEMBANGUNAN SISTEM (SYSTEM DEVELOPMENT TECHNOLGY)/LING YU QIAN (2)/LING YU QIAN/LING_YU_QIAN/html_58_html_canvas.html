<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Canvas</title>
  <style>canvas{border:1px solid #ddd}</style>
  <script>
    window.addEventListener('DOMContentLoaded', ()=>{
      const c = document.getElementById('myCanvas');
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(10,10,120,80);
      ctx.beginPath();
      ctx.arc(200,60,40,0,Math.PI*2);
      ctx.fillStyle = 'tomato';
      ctx.fill();
    });
  </script>
</head>
<body>

<h1>HTML Canvas</h1>

<canvas id="myCanvas" width="320" height="120">Your browser does not support canvas.</canvas>

<br><br><a href="index.html">Main Page</a>

</body>
</html>
