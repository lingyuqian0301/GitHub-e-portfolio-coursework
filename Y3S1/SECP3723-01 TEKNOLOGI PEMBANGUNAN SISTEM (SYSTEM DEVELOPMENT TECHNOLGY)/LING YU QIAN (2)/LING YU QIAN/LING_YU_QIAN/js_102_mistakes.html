<!DOCTYPE html>
<html>
<head>
<title>JS Mistakes</title>
</head>
<body>

<h1>JS Mistakes</h1>
<p>Common JavaScript mistakes and how to avoid them.</p>

<p id="demo"></p>

<script>
// Mistake: Using == instead of ===
let x = 5;
if (x == "5") {  // This is true (loose equality)
    document.getElementById("demo").innerHTML = 
        "x == '5' is true (loose equality)<br>" +
        "x === '5' is " + (x === "5") + " (strict equality)";
}
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
