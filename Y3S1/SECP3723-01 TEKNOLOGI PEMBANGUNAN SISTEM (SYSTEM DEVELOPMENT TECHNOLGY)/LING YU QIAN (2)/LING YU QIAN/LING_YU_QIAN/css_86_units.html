<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Units</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .px{width:120px;height:40px;background:#f0f8ff}
    .percent{width:50%;height:40px;background:#fff3f3}
    .vw{width:50vw;height:40px;background:#f3fff0}
  </style>
</head>
<body>

<h1>CSS Units</h1>
<p>Examples: px, %, em, rem, vw, vh.</p>
<div class="px">120px width</div>
<div class="percent" style="margin-top:8px">50% width (of container)</div>
<div class="vw" style="margin-top:8px">50vw width (50% of viewport width)</div>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
