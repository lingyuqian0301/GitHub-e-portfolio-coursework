<!DOCTYPE html>
<html>
<head>
<title>JS typeof</title>
</head>
<body>

<h1>JS typeof</h1>
<p>The <code>typeof</code> operator returns the type of a variable or expression.</p>

<p id="demo"></p>

<script>
document.getElementById("demo").innerHTML = 
    typeof "John" + "<br>" +
    typeof 3.14 + "<br>" +
    typeof NaN + "<br>" +
    typeof false + "<br>" +
    typeof [1,2,3,4] + "<br>" +
    typeof {name:'John', age:34} + "<br>" +
    typeof new Date() + "<br>" +
    typeof function () {} + "<br>" +
    typeof myCar + "<br>" +
    typeof null;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
