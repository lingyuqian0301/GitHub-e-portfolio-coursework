<!DOCTYPE html>
<html>
<body>

<h1>Table Styling A: Zebra Stripes</h1>

<style>
  table.zebra { border-collapse: collapse; width: 100%; }
  table.zebra th, table.zebra td { border: 1px solid #ddd; padding: 8px; }
  table.zebra tr:nth-child(even) { background: #f7f7f7; }
</style>

<table class="zebra">
  <tr><th>Name</th><th>Score</th></tr>
  <tr><td>Alice</td><td>90</td></tr>
  <tr><td>Ben</td><td>82</td></tr>
  <tr><td>Chia</td><td>88</td></tr>
</table>

<br><br><a href="index.html">Back to Main Page</a>
</body>
</html>
