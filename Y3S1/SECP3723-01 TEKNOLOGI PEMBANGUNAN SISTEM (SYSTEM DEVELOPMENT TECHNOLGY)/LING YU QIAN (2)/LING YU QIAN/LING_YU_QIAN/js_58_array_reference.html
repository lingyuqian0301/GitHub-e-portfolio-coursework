<!DOCTYPE html>
<html>
<head>
<title>JS Array Reference</title>
</head>
<body>

<h1>JS Array Reference</h1>
<p>JavaScript array methods reference.</p>

<p id="demo"></p>

<script>
const fruits = ["Banana", "Orange", "Apple"];

document.getElementById("demo").innerHTML = 
    "Array: " + fruits + "<br>" +
    "Length: " + fruits.length + "<br>" +
    "toString(): " + fruits.toString() + "<br>" +
    "join('-'): " + fruits.join("-");
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
