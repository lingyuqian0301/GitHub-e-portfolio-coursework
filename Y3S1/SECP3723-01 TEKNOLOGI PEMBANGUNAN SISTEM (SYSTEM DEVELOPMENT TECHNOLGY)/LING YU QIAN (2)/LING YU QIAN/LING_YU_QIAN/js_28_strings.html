<!DOCTYPE html>
<html>
<head>
<title>JS Strings</title>
</head>
<body>

<h1>JS Strings</h1>
<p>JavaScript strings are used for storing and manipulating text.</p>

<p id="demo"></p>

<script>
let text1 = "John Doe";
let text2 = 'John Doe';
let text3 = `John Doe`;

document.getElementById("demo").innerHTML = 
    text1 + "<br>" + text2 + "<br>" + text3;
</script>

</body>
