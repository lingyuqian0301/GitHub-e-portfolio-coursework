<!DOCTYPE html>

<head>

  <title>Float</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .left{float:left;width:100px;height:80px;background:#8e44ad;color:#fff;margin-right:12px}

<h1>Float</h1>
<p>Floating is useful for simple layouts and images. Use container clearing to wrap floats.</p>

  <p>Content that wraps next to the floated box. This demonstrates how floats affect sibling content.</p>
</div>
