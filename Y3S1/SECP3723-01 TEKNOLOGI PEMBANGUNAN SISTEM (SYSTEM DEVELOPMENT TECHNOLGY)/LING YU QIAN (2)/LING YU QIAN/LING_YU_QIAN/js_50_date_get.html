<!DOCTYPE html>
<html>
<head>
<title>JS Date Get</title>
</head>
<body>

<h1>JS Date Get</h1>
<p>Date get methods are used to get parts of a date.</p>

<p id="demo"></p>

<script>
const d = new Date();

document.getElementById("demo").innerHTML = 
    "getFullYear(): " + d.getFullYear() + "<br>" +
    "getMonth(): " + d.getMonth() + "<br>" +
    "getDate(): " + d.getDate() + "<br>" +
    "getHours(): " + d.getHours() + "<br>" +
    "getMinutes(): " + d.getMinutes();
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
