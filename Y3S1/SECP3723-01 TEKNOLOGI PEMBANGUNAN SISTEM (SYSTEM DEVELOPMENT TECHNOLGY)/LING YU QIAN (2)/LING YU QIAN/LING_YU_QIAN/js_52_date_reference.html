<!DOCTYPE html>
<html>
<head>
<title>JS Date Reference</title>
</head>
<body>

<h1>JS Date Reference</h1>
<p>JavaScript date methods reference.</p>

<p id="demo"></p>

<script>
const d = new Date();

document.getElementById("demo").innerHTML = 
    "Current Date: " + d + "<br>" +
    "getFullYear(): " + d.getFullYear() + "<br>" +
    "getMonth(): " + d.getMonth() + "<br>" +
    "getDate(): " + d.getDate() + "<br>" +
    "getDay(): " + d.getDay();
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
