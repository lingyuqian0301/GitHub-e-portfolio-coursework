<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Errors</title>
  <style>
    /* A missing semicolon or wrong property name will be ignored */
    body{font-family:Arial,Helvetica,sans-serif;padding:20px;color:#333}
    .ok{color:green}
    .ignored{color:#999}
  </style>
</head>
<body>

<h1>CSS Errors</h1>
<p>Browsers ignore invalid CSS rules. Valid rules still apply.</p>
<p class="ok">This text uses a valid rule (green).</p>
<p class="ignored">This text shows how invalid rules are ignored.</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
