<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Transitions</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .btn{display:inline-block;padding:10px 16px;background:#2196F3;color:#fff;border-radius:6px;transition:background .25s ease, transform .2s}
    .btn:hover{background:#1976D2;transform:translateY(-2px)}
  </style>
</head>
<body>

<h1>CSS Transitions</h1>
<a class="btn" href="#">Hover me</a>
<p>Transitions animate property changes smoothly when the property value changes.</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
