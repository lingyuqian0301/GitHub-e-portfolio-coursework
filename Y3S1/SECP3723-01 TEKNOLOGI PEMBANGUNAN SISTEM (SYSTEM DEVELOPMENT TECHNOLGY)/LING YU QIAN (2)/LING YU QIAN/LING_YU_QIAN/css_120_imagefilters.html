<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Image Filters</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    img{width:200px;height:auto;margin:8px}
    .gray{filter:grayscale(100%)}
    .blur{filter:blur(2px)}
  </style>
</head>
<body>

<h1>CSS Image Filters</h1>
<img src="images/img_food.jpg" alt="food">
<img class="gray" src="images/img_food.jpg" alt="food gray">
<img class="blur" src="images/img_food.jpg" alt="food blur">

<br><br><a href="index.html">Main Page</a>
</body>
</html>
