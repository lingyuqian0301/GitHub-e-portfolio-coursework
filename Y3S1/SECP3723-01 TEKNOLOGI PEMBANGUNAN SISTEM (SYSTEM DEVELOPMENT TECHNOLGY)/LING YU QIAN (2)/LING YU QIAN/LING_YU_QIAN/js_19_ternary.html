<title>JS Ternary</title>
</head>
<body>

<h1>JS Ternary</h1>
<p>The ternary operator is a shorthand for the if...else statement.</p>

<p id="demo"></p>

<script>
let age = 18;
let voteable = (age < 18) ? "Too young" : "Old enough";

document.getElementById("demo").innerHTML = voteable + " to vote.";
</script>
