<!DOCTYPE html>
<html>
<head>
<title>JS Objects</title>
</head>
<body>

<h1>JS Objects</h1>
<p>JavaScript objects are containers for named values called properties.</p>

<p id="demo"></p>

<script>
const person = {
    firstName: "John",
    lastName: "Doe",
    age: 50,
    eyeColor: "blue"
};

document.getElementById("demo").innerHTML = 
    person.firstName + " is " + person.age + " years old.";
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
