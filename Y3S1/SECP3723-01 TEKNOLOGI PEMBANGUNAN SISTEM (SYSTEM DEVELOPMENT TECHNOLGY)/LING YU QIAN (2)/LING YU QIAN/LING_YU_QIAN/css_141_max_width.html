<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
div.ex1 {
  width: 600px;
  margin: auto;
  border: 2px solid #73AD21;
}

div.ex2 {
  max-width: 700px;
  margin: auto;
  border: 4px solid #73AD21;
}
</style>
</head>
<body>

<h2>CSS Max-width</h2>

<div class="ex1">This div element has width: 600px;</div>
<br>

<div class="ex2">This div element has max-width: 700px;</div>

<p><strong>Tip:</strong> Drag the browser window to smaller than 600px wide, to see the difference between 
the two divs!</p>

<p><a href="index.html">Back</a></p>

</body>
</html>
