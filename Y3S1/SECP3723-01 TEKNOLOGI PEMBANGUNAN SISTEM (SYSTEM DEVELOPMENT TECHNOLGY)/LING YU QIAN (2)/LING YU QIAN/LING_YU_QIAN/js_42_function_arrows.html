<!DOCTYPE html>
<html>
<head>
<title>Function Arrows</title>
</head>
<body>

<h1>Function Arrows</h1>
<p>Arrow functions allow a short syntax for writing function expressions.</p>

<p id="demo"></p>

<script>
// Regular function
const regular = function(x) {
    return x * 2;
};

// Arrow function
const arrow = (x) => x * 2;

document.getElementById("demo").innerHTML = 
    "Regular function: " + regular(5) + "<br>" +
    "Arrow function: " + arrow(5);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
