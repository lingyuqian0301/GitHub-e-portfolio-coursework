<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
p.one {
  border-style: solid;
  border-width: 3px 15px; /* 3px top and bottom, 15px on the sides */
}

p.two {
  border-style: solid;
  border-width: 18px 5px; /* 18px top and bottom, 5px on the sides */
}

p.three {
  border-style: solid;
  border-width: 20px 11px 4px 33px; /* 20px top, 11px right, 4px bottom and 33px left */
}
</style>
</head>
<body>

<h2>The border-width Property</h2>
<p>The border-width property can have from one to four values (for the top border, right border, bottom border, and the left border):</p>

<p class="one">Some text.</p>
<p class="two">Some text.</p>
<p class="three">Some text.</p>

<p><a href="index.html">Back</a></p>

</body>
</html>
