<h1>JS Debugging</h1>
<p>JavaScript debugging can be done using the browser console or debugger statement.</p>

<p id="demo"></p>

<script>
let x = 15 * 5;
debugger;  // Stops execution if debugging tools are open
document.getElementById("demo").innerHTML = x;
</script>
