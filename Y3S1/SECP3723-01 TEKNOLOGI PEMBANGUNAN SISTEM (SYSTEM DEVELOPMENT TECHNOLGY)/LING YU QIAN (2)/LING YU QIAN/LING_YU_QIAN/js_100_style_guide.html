<h1>JS Style Guide</h1>
<p>JavaScript style guide recommendations for writing clean code.</p>

<p id="demo"></p>

// Use camelCase for variable names
let firstName = "John";
let lastName = "Doe";

// Use meaningful names
let fullName = firstName + " " + lastName;

</script>
