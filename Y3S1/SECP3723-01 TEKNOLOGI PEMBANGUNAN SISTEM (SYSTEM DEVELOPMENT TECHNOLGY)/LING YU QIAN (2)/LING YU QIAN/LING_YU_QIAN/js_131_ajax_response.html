<!DOCTYPE html>
<html>
<head>
<title>AJAX Response</title>
</head>
<body>

<h1>AJAX Response</h1>
<p>The server response can be retrieved using the responseText or responseXML property.</p>

<p id="demo"></p>

<button type="button" onclick="loadDoc()">Get Response</button>

<script>
function loadDoc() {
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
        document.getElementById("demo").innerHTML = this.responseText;
    }
    xhttp.open("GET", "ajax_info.txt", true);
    xhttp.send();
}
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
