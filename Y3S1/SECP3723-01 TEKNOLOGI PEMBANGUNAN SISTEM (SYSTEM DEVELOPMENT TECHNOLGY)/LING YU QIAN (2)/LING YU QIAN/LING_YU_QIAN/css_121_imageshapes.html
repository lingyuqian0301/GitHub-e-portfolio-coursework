<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Image Shapes</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .circle{width:120px;height:120px;border-radius:50%;overflow:hidden}
    .circle img{width:100%;height:100%;object-fit:cover}
  </style>
</head>
<body>

<h1>CSS Image Shapes</h1>
<div class="circle"><img src="images/img_car.jpg" alt="car"></div>
<p>Use <code>border-radius</code> and <code>object-fit</code> to create shaped images.</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
