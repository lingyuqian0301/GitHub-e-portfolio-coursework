<!DOCTYPE html>

<head>
<title>JS Let</title>
</head>
<body>

<h1>JS Let</h1>
<p>The <code>let</code> keyword was introduced in ES6 (2015). Variables defined with <code>let</code> have block scope.</p>

<p id="demo"></p>

<script>
let x = 5;
let y = 6;
let z = x + y;

document.getElementById("demo").innerHTML = "The value of z is: " + z;
</script>

</body>
</html>
