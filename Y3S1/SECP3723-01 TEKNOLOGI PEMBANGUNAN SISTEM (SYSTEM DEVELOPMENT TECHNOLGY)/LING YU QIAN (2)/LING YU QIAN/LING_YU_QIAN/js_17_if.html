<!DOCTYPE html>
<html>
<head>
<title>JS If</title>
</head>
<body>

<h1>JS If</h1>
<p>The <code>if</code> statement executes a block of code if a specified condition is true.</p>

<p id="demo"></p>

<script>
let x = 10;

if (x > 5) {
    document.getElementById("demo").innerHTML = "x is greater than 5";
}
</script>

</body>
</html>
