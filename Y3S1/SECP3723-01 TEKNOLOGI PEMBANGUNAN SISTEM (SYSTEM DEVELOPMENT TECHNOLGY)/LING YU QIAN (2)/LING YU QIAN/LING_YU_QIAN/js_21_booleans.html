<body>

<h1>JS Booleans</h1>
<p>JavaScript booleans can have one of two values: true or false.</p>

<p id="demo"></p>

<script>
let x = 5;
let y = 5;
let z = 6;

document.getElementById("demo").innerHTML = 
    "(x == y) is " + (x == y) + "<br>" +
    "(x == z) is " + (x == z);
</script>

</body>
