<!DOCTYPE html>
<html>
<head>
<title>JS Array Const</title>
</head>
<body>

<h1>JS Array Const</h1>
<p>Arrays declared with <code>const</code> cannot be reassigned, but elements can be changed.</p>

<p id="demo"></p>

<script>
const cars = ["Saab", "Volvo", "BMW"];
cars[0] = "Toyota";
cars.push("Audi");

document.getElementById("demo").innerHTML = cars;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
