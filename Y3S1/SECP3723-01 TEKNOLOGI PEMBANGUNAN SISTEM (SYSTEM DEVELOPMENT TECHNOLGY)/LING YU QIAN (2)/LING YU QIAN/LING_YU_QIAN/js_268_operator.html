<!DOCTYPE html>
<html lang="en-US">
<body>

<h1>JavaScript Operators</h1>
<h2>The Assignment (=) Operator</h2>

<p id="demo7"></p>

<script>
// Assign the value 4 to x
let x = 4;
// Assign the value 3 to y
let y = 3;
// Assign the value x + y to z
let z = x + y;
// Display z
document.getElementById("demo7").innerHTML = "The sum of x + y is: " + z;
</script>

<h1>JavaScript Arithmetic</h1>
<h2>The += Operator</h2>

<p id="demo5"></p>

<script>
var a = 12;
a += 2;
document.getElementById("demo5").innerHTML = a;
</script>

<p><a href="index.html">Back</a></p>

</body>
</html>
