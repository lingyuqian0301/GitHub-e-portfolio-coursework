<!DOCTYPE html>
<html lang="en-US">
<style>
.tooltip {
  position: relative;
  display: inline-block;
  border-bottom: 4px dotted black;
}

.tooltip .tooltiptext {
  visibility: hidden;
  width: 125px;
  background-color: black;
  color: whitesmoke;
  text-align: center;
  border-radius: 4px;
  padding: 7px 0;
  position: absolute;
  z-index: 1;
  bottom: 150%;
  left: 50%;
  margin-left: -60px;
}

.tooltip .tooltiptext::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  margin-left: -5px;
  border-width: 5px;
  border-style: solid;
  border-color: black transparent transparent transparent;
}

.tooltip:hover .tooltiptext {
  visibility: visible;
}
</style>
<body style="text-align:center;">

<h2>Top Tooltip w/ Bottom Arrow</h2>

<div class="tooltip">Hover over me!
  <span class="tooltiptext">Tooltip text</span>
</div>

<p><a href="index.html">Back</a></p>

</body>
</html>
