<!DOCTYPE html>
<html>
<head>
<title>JS Date Set</title>
</head>
<body>

<h1>JS Date Set</h1>
<p>Date set methods are used to set parts of a date.</p>

<p id="demo"></p>

<script>
const d = new Date();
d.setFullYear(2020);
d.setMonth(11);
d.setDate(25);

document.getElementById("demo").innerHTML = d;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
