<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Audio</title>
</head>
<body>

<h1>HTML Audio</h1>

<audio controls>
  <!-- Local files (place your files in a 'media' folder) -->
  <source src="media/track.mp3" type="audio/mpeg">
  <source src="media/track.ogg" type="audio/ogg">
  <!-- Fallback remote sample: will play if local files are not found -->
  <source src="https://file-examples.com/wp-content/uploads/2017/11/file_example_MP3_700KB.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<p>Tip: Provide multiple formats for wider compatibility. If you want a local audio file to play, create a folder named <code>media</code> next to this file and put your <code>track.mp3</code> (or <code>track.ogg</code>) inside.</p>

<p>If you prefer, download the sample audio: <a href="https://file-examples.com/wp-content/uploads/2017/11/file_example_MP3_700KB.mp3" target="_blank">sample MP3</a></p>

<br><br><a href="index.html">Main Page</a>

</body>
</html>
