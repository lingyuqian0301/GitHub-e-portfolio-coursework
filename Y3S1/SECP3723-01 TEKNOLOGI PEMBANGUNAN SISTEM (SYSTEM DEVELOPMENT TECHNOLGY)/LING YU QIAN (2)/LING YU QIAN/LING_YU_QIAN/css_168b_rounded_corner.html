<!DOCTYPE html>
<html lang="en-US">
<head>
<style> 
#rcorners1 {
  border-radius: 50px / 20px;
  background: yellow;
  padding: 20px; 
  width: 200px;
  height: 150px;
}

#rcorners2 {
  border-radius: 20px / 50px;
  background: red;
  padding: 20px; 
  width: 200px;
  height: 150px; 
}

#rcorners3 {
  border-radius: 45%;
  background: blue;
  padding: 20px; 
  width: 200px;
  height: 150px;
} 
</style>
</head>
<body>

<h1>The border-radius Property</h1>

<p>Elliptical border - border-radius: 50px / 20px:</p>
<p id="rcorners1"></p>

<p>Elliptical border - border-radius: 20px / 50px:</p>
<p id="rcorners2"></p>

<p>Ellipse border - border-radius: 45%:</p>
<p id="rcorners3"></p>

</body>
</html>
