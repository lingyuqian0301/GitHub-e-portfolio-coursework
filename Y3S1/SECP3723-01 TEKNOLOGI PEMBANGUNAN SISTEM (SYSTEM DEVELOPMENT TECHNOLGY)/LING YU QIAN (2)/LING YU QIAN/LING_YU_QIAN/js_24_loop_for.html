<!DOCTYPE html>
<html>
<head>
<title>JS Loop for</title>
</head>
<body>

<h1>JS Loop for</h1>
<p>The <code>for</code> loop loops through a block of code a number of times.</p>

<p id="demo"></p>

<script>
let text = "";
for (let i = 0; i < 5; i++) {
    text += "Number " + i + "<br>";
}
document.getElementById("demo").innerHTML = text;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
