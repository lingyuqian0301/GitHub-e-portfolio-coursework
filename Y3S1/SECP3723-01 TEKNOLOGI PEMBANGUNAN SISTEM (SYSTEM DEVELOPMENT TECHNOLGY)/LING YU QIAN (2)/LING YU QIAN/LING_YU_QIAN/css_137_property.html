<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS @property</title>
  <style>
    @property --btn-bg {syntax: '<color>';initial-value: #2196F3;inherits: false}
    :root{--btn-bg:#2196F3}
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .btn{background:var(--btn-bg);color:#fff;padding:10px 16px;border-radius:6px}
  </style>
</head>
<body>

<h1>CSS @property</h1>
<p>The <code>@property</code> rule lets you define custom property syntax and initial values (browser support varies).</p>
<button class="btn">Example button</button>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
