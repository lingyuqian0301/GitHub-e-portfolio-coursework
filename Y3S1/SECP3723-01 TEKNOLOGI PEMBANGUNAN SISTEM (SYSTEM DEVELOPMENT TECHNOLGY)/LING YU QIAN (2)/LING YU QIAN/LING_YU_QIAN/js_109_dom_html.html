<h1>DOM HTML</h1>
<p>DOM methods allow you to change the content and style of HTML elements.</p>

<p id="demo">Old text</p>

<script>
document.getElementById("demo").innerHTML = "New text";
document.getElementById("demo").style.color = "red";
</script>
