<!DOCTYPE html>
<html>
<head>
<title>JS Number Methods</title>
</head>
<body>

<h1>JS Number Methods</h1>
<p>JavaScript number methods help you work with numbers.</p>

<p id="demo"></p>

<script>
let x = 9.656;

document.getElementById("demo").innerHTML = 
    "x = " + x + "<br>" +
    "toFixed(2): " + x.toFixed(2) + "<br>" +
    "toPrecision(2): " + x.toPrecision(2) + "<br>" +
    "toString(): " + x.toString() + "<br>" +
    "valueOf(): " + x.valueOf();
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
