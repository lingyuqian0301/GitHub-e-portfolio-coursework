<!DOCTYPE html>
<html>
<body>

<h1>Table Styling B: Hover Rows</h1>

<style>
  table.hover { border-collapse: collapse; width: 100%; }
  table.hover th, table.hover td { border: 1px solid #ddd; padding: 8px; }
  table.hover tr:hover { background: #e3f2fd; }
</style>

<table class="hover">
  <tr><th>Task</th><th>Status</th></tr>
  <tr><td>Design</td><td>Done</td></tr>
  <tr><td>Build</td><td>In Progress</td></tr>
  <tr><td>Test</td><td>Pending</td></tr>
</table>

</body>
</html>
