<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Input Types</title>
  <style>label{display:block;margin-top:.6rem}</style>
</head>
<body>

<h1>HTML Input Types</h1>

<form>
  <label>Text: <input type="text" name="t"></label>
  <label>Password: <input type="password" name="p"></label>
  <label>Email: <input type="email" name="e"></label>
  <label>Number: <input type="number" name="n" min="0" max="10"></label>
  <label>Date: <input type="date" name="d"></label>
  <label>Color: <input type="color" name="c"></label>
  <label>Range: <input type="range" name="r" min="0" max="100"></label>
</form>

<br><br><a href="index.html">Main Page</a>

</body>
</html>
