<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
#p1 {background-color: rgba(255, 0, 0, 0.5);}  /* red with opacity */
#p2 {background-color: hsla(120, 100%, 50%, 0.4);}  /* green with opacity */
#p3 {background-color:rgb(0,0,255);opacity:0.65;}
#p4 {background-color:rgb(192,192,192);opacity:0.6;}
#p5 {background-color:hsl(290,100%,50%);opacity:0.3;}
#p6 {background-color:rgb(255,0,255);opacity:0.8;}
</style>
</head>
<body>

<h1>Define Colors With Opacity</h1>

<p id="p1">Red</p>
<p id="p2">Green</p>
<p id="p3">Blue</p>
<p id="p4">Grey</p>
<p id="p5">Violet</p>
<p id="p6">Cerise</p>

<p><a href="index.html">Back</a></p>

</body>
</html>
