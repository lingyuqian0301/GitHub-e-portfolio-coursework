<h1>JS Error Object</h1>
<p>The JavaScript Error object provides error information when an error occurs.</p>

<p id="demo"></p>

<script>
try {
    adddlert("Welcome guest!");
} catch(err) {
    document.getElementById("demo").innerHTML = 
        "Error name: " + err.name + "<br>" +
        "Error message: " + err.message + "<br>" +
        "Error stack: " + err.stack.substring(0, 100) + "...";
}
</script>
