<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Badge</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-3">
  <h2>Badges</h2>
  <h1>Example heading <span class="badge bg-secondary">1</span></h1>
  <h2>Example heading <span class="badge bg-secondary">2</span></h2>
  <h3>Example heading <span class="badge bg-secondary">3</span></h3>
  <h4>Example heading <span class="badge bg-secondary">4</span></h4>
  <h5>Example heading <span class="badge bg-secondary">5</span></h5>
  <h6>Example heading <span class="badge bg-secondary">6</span></h6>
</div>

<div class="container mt-3">
  <h2>Contextual Badges</h2>
  <span class="badge bg-primary">Primary</span>
  <span class="badge bg-secondary">Secondary</span>
  <span class="badge bg-success">Success</span>
  <span class="badge bg-danger">Danger</span>
  <span class="badge bg-warning">Warning</span>
  <span class="badge bg-info">Info</span>
  <span class="badge bg-light">Light</span>
  <span class="badge bg-dark">Dark</span>
</div>

<div class="container mt-3">
  <h2>Pill Badges</h2>
  <span class="badge rounded-pill bg-primary">Primary</span>
  <span class="badge rounded-pill bg-secondary">Secondary</span>
  <span class="badge rounded-pill bg-warning">Warning</span>
  <span class="badge rounded-pill bg-info">Info</span>
  <span class="badge rounded-pill bg-light">Light</span>
  <span class="badge rounded-pill bg-dark">Dark</span>
  <span class="badge rounded-pill bg-success">Success</span>
  <span class="badge rounded-pill bg-danger">Danger</span>
</div>

<div class="container mt-3">
  <h2>Badge inside a Button</h2>
  <button type="button" class="btn btn-primary">
    Messages received <span class="badge bg-danger">12</span>
  </button>
  <button type="button" class="btn btn-danger">
    Notifications received<span class="badge bg-dark">21</span>
  </button>

  <p><a href="index.html">Back</a></p>
</div>

</body>
</html>
