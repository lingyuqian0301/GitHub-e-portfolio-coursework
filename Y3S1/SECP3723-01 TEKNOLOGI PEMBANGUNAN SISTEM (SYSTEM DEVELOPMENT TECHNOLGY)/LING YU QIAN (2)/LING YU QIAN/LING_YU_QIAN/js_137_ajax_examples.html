<!DOCTYPE html>
<html>
<head>
<title>AJAX Examples</title>
</head>
<body>

<h1>AJAX Examples</h1>
<p>Examples of AJAX in action.</p>

<p id="demo"></p>

<button type="button" onclick="loadDoc()">Load content</button>

<script>
function loadDoc() {
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
        document.getElementById("demo").innerHTML = "Content loaded via AJAX";
    }
    xhttp.open("GET", "ajax_info.txt", true);
    xhttp.send();
}
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
