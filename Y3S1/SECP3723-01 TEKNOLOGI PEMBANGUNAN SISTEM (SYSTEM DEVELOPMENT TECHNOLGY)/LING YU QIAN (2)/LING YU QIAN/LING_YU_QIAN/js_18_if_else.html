<!DOCTYPE html>
<html>
<head>
<title>JS If Else</title>
</head>
<body>

<h1>JS If Else</h1>
<p>The <code>if...else</code> statement executes a block of code if a condition is true, and another block if the condition is false.</p>

<p id="demo"></p>

<script>
let hour = new Date().getHours();

if (hour < 18) {
    document.getElementById("demo").innerHTML = "Good day!";
} else {
    document.getElementById("demo").innerHTML = "Good evening!";
}
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
