<!DOCTYPE html>
<html>
<head>
<title>JS Logical</title>
</head>
<body>

<h1>JS Logical</h1>
<p>JavaScript logical operators are used to determine the logic between variables or values.</p>

<p id="demo"></p>

<script>
let x = 6;
let y = 3;

document.getElementById("demo").innerHTML = 
    "(x < 10 && y > 1) is " + (x < 10 && y > 1) + "<br>" +
    "(x == 5 || y == 5) is " + (x == 5 || y == 5) + "<br>" +
    "!(x == y) is " + !(x == y);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
