<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Image Modal</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .thumb{width:150px;cursor:pointer}
    /* Basic modal with CSS only: checkbox hack */
    #m:checked ~ .modal{display:flex}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center}
    .modal img{max-width:90%;max-height:90%}
  </style>
</head>
<body>

<h1>CSS Image Modal</h1>
<label><input id="m" type="checkbox" style="display:none"><img class="thumb" src="images/pic_trulli.jpg" alt="thumb"></label>
<div class="modal"><label for="m"><img src="images/pic_trulli.jpg" alt="large"></label></div>
<p>Click the thumbnail to open a simple CSS-only modal (checkbox technique).</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
