<!DOCTYPE html>
<html>
<head>
<title>JS toString()</title>
</head>
<body>

<h1>JS toString()</h1>
<p>The <code>toString()</code> method converts a number to a string.</p>

<p id="demo"></p>

<script>
let x = 123;
let y = 123.456;

document.getElementById("demo").innerHTML = 
    "x.toString(): " + x.toString() + "<br>" +
    "(123).toString(): " + (123).toString() + "<br>" +
    "(100 + 23).toString(): " + (100 + 23).toString() + "<br>" +
    "y.toString(): " + y.toString();
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
