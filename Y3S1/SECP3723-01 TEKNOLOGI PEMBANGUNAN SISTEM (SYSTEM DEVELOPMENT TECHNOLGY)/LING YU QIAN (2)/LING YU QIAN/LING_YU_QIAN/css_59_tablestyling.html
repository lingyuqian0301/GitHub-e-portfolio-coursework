<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Table Styling</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    table{border-collapse:collapse;width:100%}
    th{background:#34495e;color:#fff;padding:8px}
    td{border-bottom:1px solid #eee;padding:8px}
  </style>
</head>
<body>

<h1>Table Styling</h1>
<table>
  <tr><th>Product</th><th>Price</th></tr>
  <tr><td>Item A</td><td>$10</td></tr>
  <tr><td>Item B</td><td>$12</td></tr>
</table>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
