<!DOCTYPE html>
<html lang="en-US">
<body>

<h2>JavaScript constants</h2>

<p id="demo5"></p>

<script>
try {
  const PI = 3.141592653589793;
  PI = 3.14;
}
catch (err) {
  document.getElementById("demo5").innerHTML = err;
}
</script>

<h2>JavaScript constant array</h2>

<p>Declaring a constant array does NOT make the elements unchangeable:</p>

<p id="demo2"></p>

<script>
// Create an Array:
const cars = ["Myvi", "Audi", "BMW"];

// Change an element:
cars[0] = "Toyota";

// Add an element:
cars.push("Audi");

// Display the Array:
document.getElementById("demo2").innerHTML = cars; 
</script>

<p><a href="index.html">Back</a></p>

</body>
</html>
