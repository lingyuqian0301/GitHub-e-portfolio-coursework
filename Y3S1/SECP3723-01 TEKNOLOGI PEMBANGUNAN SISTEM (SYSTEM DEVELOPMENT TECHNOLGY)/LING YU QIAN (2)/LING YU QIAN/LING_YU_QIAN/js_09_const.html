<body>

<h1>JS Const</h1>
<p>The <code>const</code> keyword was introduced in ES6 (2015). Variables defined with <code>const</code> cannot be reassigned.</p>

<p id="demo"></p>

<script>
const PI = 3.14159265359;
const radius = 5;
const area = PI * radius * radius;

document.getElementById("demo").innerHTML = "Area of circle with radius " + radius + " is: " + area;
</script>
