<h1>HTML Form Attributes</h1>

<p>Common form attributes: <code>action</code>, <code>method</code>, <code>enctype</code>, <code>target</code>, <code>novalidate</code>.</p>

<form action="/upload" method="post" enctype="multipart/form-data" target="_blank">
  <label>Upload file: <input type="file" name="file"></label><br>
  <input type="submit" value="Upload">
</form>
