<!DOCTYPE html>
<html>
<head>
<title>JS Assignment</title>
</head>
<body>

<h1>JS Assignment</h1>
<p>JavaScript assignment operators assign values to JavaScript variables.</p>

<p id="demo"></p>

<script>
let x = 10;
document.getElementById("demo").innerHTML = "x = " + x;

x += 5;  // x = x + 5
document.getElementById("demo").innerHTML += "<br>x += 5: " + x;

x -= 3;  // x = x - 3
document.getElementById("demo").innerHTML += "<br>x -= 3: " + x;

x *= 2;  // x = x * 2
document.getElementById("demo").innerHTML += "<br>x *= 2: " + x;

x /= 4;  // x = x / 4
document.getElementById("demo").innerHTML += "<br>x /= 4: " + x;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
