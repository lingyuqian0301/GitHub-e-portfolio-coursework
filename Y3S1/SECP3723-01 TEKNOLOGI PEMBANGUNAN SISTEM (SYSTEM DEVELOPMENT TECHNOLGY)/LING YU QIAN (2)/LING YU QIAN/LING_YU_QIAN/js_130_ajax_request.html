<!DOCTYPE html>
<html>
<head>
<title>AJAX Request</title>
</head>
<body>

<h1>AJAX Request</h1>
<p>AJAX requests are made using the XMLHttpRequest object.</p>

<p id="demo"></p>

<button type="button" onclick="makeRequest()">Make Request</button>

<script>
function makeRequest() {
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
        document.getElementById("demo").innerHTML = "Request completed";
    }
    xhttp.open("GET", "ajax_info.txt", true);
    xhttp.send();
}
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
