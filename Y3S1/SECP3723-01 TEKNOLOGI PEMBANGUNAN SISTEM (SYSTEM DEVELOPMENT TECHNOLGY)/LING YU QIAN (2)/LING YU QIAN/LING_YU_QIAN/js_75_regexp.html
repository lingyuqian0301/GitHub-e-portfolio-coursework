<title>JS RegExp</title>
</head>
<body>

<h1>JS RegExp</h1>
<p>A regular expression is a pattern of characters used to search and replace strings.</p>

<p id="demo"></p>

<script>
let text = "Visit W3Schools";
let n = text.search(/w3schools/i);

document.getElementById("demo").innerHTML = "Position: " + n;
</script>
