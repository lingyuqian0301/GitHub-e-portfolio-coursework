<!DOCTYPE html>
<html>
<head>
<title>JS Syntax</title>
</head>
<body>

<h1>JS Syntax</h1>
<p>JavaScript syntax is the set of rules that define how JavaScript programs are constructed.</p>

<h2>JavaScript Values</h2>
<p id="demo1"></p>

<h2>JavaScript Literals</h2>
<p id="demo2"></p>

<h2>JavaScript Variables</h2>
<p id="demo3"></p>

<h2>JavaScript Operators</h2>
<p id="demo4"></p>

<script>
// Numbers
document.getElementById("demo1").innerHTML = "Number: " + 5.5;

// Strings
document.getElementById("demo2").innerHTML = "String: " + "Hello World";

// Variables
let x, y;
x = 5;
y = 6;
document.getElementById("demo3").innerHTML = "x = " + x + ", y = " + y;

// Operators
document.getElementById("demo4").innerHTML = "x + y = " + (x + y);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
