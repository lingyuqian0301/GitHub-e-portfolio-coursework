<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Grid Items</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .i{background:#fff;padding:12px;border:1px solid #eee}
    .span{grid-column:span 2;background:#eef9f1}
  </style>
</head>
<body>

<h1>Grid Items</h1>
<div class="g">
  <div class="i">1</div>
  <div class="i span">2 — spans 2 columns</div>
  <div class="i">3</div>
</div>
<p>Grid items can be placed and spanned using properties like <code>grid-column</code> and <code>grid-row</code>.</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
