<!DOCTYPE html>
<html>
<head>
<title>JS Math Random</title>
</head>
<body>

<h1>JS Math Random</h1>
<p><code>Math.random()</code> returns a random number between 0 (inclusive) and 1 (exclusive).</p>

<p id="demo"></p>

<script>
document.getElementById("demo").innerHTML = 
    "Math.random(): " + Math.random() + "<br>" +
    "Random 0-10: " + Math.floor(Math.random() * 11) + "<br>" +
    "Random 1-10: " + Math.floor(Math.random() * 10) + 1;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
