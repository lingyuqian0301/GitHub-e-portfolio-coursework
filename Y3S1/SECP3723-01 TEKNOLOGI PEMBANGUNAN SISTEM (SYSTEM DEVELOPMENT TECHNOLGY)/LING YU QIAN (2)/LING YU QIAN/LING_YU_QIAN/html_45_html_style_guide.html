<h1>HTML Style Guide</h1>

<p>Short tips for an HTML style guide:</p>
<ul>
  <li>Use lowercase element names and attributes.</li>
  <li>Prefer semantic elements (&lt;main&gt;, &lt;header&gt;).</li>
  <li>Organize CSS with clear class names (e.g., <code>.btn-primary</code>).</li>
</ul>

<p>Example button: <span class="btn btn-primary">Primary</span></p>
