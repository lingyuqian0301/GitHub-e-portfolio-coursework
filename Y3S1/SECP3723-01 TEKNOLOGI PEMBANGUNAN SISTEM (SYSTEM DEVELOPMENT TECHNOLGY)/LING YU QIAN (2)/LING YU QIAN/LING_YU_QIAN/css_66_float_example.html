<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Float Example</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    img{float:left;margin-right:12px;width:120px;height:auto}
    .text{overflow:auto}
  </style>
</head>
<body>

<h1>Float Example</h1>
<p>Float an element to the left or right to allow text to wrap around it.</p>
<img src="images/img_car.jpg" alt="car">
<div class="text">This paragraph flows around the floated image. Use <code>clear</code> or contain floats to avoid layout issues.</div>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
