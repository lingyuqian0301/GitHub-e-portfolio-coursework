<!DOCTYPE html>
<html>
<head>
<title>JS JSON</title>
</head>
<body>

<h1>JS JSON</h1>
<p>JSON is a format for storing and transporting data.</p>

<p id="demo"></p>

<script>
let text = '{"name":"John", "age":30, "city":"New York"}';
let obj = JSON.parse(text);

document.getElementById("demo").innerHTML = 
    obj.name + ", " + obj.age;
</script>

</body>
</html>
