<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Forms</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    label{display:block;margin-top:8px}
    input,select,textarea{padding:8px;border:1px solid #ccc;border-radius:4px;width:100%;max-width:360px}
    .row{margin-top:12px}
  </style>
</head>
<body>

<h1>CSS Forms</h1>
<form>
  <label>Name</label>
  <input type="text" placeholder="Your name">
  <label class="row">Message</label>
  <textarea rows="4" placeholder="Write something..."></textarea>
  <div class="row"><button type="submit">Send</button></div>
</form>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
