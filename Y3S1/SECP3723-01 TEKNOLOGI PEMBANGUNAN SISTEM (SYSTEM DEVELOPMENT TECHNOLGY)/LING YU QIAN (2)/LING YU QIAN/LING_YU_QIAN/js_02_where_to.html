<!DOCTYPE html>
<html>
<head>
<title>JS Where To</title>
</head>
<body>

<h1>JS Where To</h1>
<p>JavaScript can be placed in the &lt;head&gt; or &lt;body&gt; section of an HTML page, or in external files.</p>

<h2>JavaScript in &lt;head&gt;</h2>
<script>
function myFunction() {
    document.getElementById("demo").innerHTML = "Paragraph changed by JavaScript in head.";
}
</script>

<p id="demo">A paragraph.</p>
<button type="button" onclick="myFunction()">Try it</button>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
