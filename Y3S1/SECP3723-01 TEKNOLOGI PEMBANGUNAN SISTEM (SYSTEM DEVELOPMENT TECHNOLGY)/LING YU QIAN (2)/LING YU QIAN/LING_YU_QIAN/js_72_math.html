<!DOCTYPE html>
<html>
<head>
<title>JS Math</title>
</head>
<body>

<h1>JS Math</h1>
<p>The JavaScript Math object allows you to perform mathematical tasks.</p>

<p id="demo"></p>

<script>
document.getElementById("demo").innerHTML = 
    "Math.PI: " + Math.PI + "<br>" +
    "Math.round(4.7): " + Math.round(4.7) + "<br>" +
    "Math.pow(8, 2): " + Math.pow(8, 2) + "<br>" +
    "Math.sqrt(64): " + Math.sqrt(64) + "<br>" +
    "Math.abs(-4.7): " + Math.abs(-4.7);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
