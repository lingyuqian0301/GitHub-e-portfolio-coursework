<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
p.one {
  border-style: solid;
  border-width: 8px;
}

p.two {
  border-style: solid;
  border-width: medium;
}

p.three {
  border-style: dotted;
  border-width: 1px;
}

p.four {
  border-style: dotted;
  border-width: thick;
}

p.five {
  border-style: double;
  border-width: 11px;
}

p.six {
  border-style: double;
  border-width: thick;
}
</style>
</head>
<body>

<h2>The border-width Property!</h2>
<p>This property specifies the width of the six borders:</p>

<p class="one">Some text.</p>
<p class="two">Some text.</p>
<p class="five">Some text.</p>
<p class="six">Some text.</p>
<p class="three">Some text.</p>
<p class="four">Some text.</p>

<p><b>Note:</b> The "border-width" property does not work if it is used alone. 
Always specify the "border-style" property to set the borders first.</p>

<p><a href="index.html">Back</a></p>

</body>
</html>
