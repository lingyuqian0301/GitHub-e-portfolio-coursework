<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Counters</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    ol.counter{counter-reset:section}
    ol.counter li{counter-increment:section;margin:8px 0}
    ol.counter li::before{content:counter(section) ". ";font-weight:bold}
  </style>
</head>
<body>

<h1>CSS Counters</h1>
<ol class="counter">
  <li>First item</li>
  <li>Second item</li>
  <li>Third item</li>
</ol>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
