<!DOCTYPE html>
<html>
<body>

<h1>Table Borders B: CSS Borders</h1>

<style>
  table.demo { border-collapse: collapse; }
  table.demo, table.demo th, table.demo td { border: 1px solid #666; }
  table.demo th, table.demo td { padding: 8px 10px; }
</style>

<table class="demo">
  <tr><th>Country</th><th>Code</th></tr>
  <tr><td>Malaysia</td><td>MY</td></tr>
  <tr><td>Singapore</td><td>SG</td></tr>
</table>

<br><br><a href="index.html">Back to Main Page</a>
</body>
</html>
