<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
h1 {
  margin: 0 0 40px 0;
}

h2 {
  margin: 25px 0 0 0;
}
</style>
</head>
<body>

<p>In this example the h1 element has a bottom margin of 40px and the h2 element has a top margin of 25px. So, the vertical margin between h1 and h2 should have been 65px (40px + 25px). However, due to margin collapse, the actual margin ends up being 50px.</p>

<h1>Heading 1</h1>
<h2>Heading 2</h2>

<p><a href="index.html">Back</a></p>

</body>
</html>
