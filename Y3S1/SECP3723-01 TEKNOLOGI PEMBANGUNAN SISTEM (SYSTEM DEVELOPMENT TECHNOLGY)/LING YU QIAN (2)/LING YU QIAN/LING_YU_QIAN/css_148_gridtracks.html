<!DOCTYPE html>

  <meta charset="utf-8">
  <title>Grid Tracks</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .g{display:grid;grid-template-columns:100px repeat(2,1fr) 50px;gap:6px}
    .box{background:#fff;padding:8px;border:1px solid #eee}
  </style>
</head>
<body>

<h1>Grid Tracks</h1>
<p>Grid tracks are the individual rows and columns defined by <code>grid-template-rows</code> and <code>grid-template-columns</code>.</p>
<div class="g"><div class="box">1</div><div class="box">2</div><div class="box">3</div><div class="box">4</div></div>

</body>
</html>
