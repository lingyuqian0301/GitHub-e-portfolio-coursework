<body>

<h1>Function Parameters</h1>
<p>Function parameters are the names listed in the function definition.</p>

<p id="demo"></p>

<script>
function calculateArea(width, height) {
    return width * height;
}

document.getElementById("demo").innerHTML = "Area: " + calculateArea(5, 3);
</script>
