<h1>HTML Entities</h1>

<p>Common HTML entities:</p>
<ul>
  <li>&amp; written as <code>&amp;amp;</code></li>
  <li>&lt; written as <code>&amp;lt;</code></li>
  <li>&gt; written as <code>&amp;gt;</code></li>
  <li>© written as <code>&amp;copy;</code></li>
  <li>€ written as <code>&amp;euro;</code> (or use UTF-8)</li>
</ul>

<p>Output example: &amp; &lt; &gt; © €</p>
