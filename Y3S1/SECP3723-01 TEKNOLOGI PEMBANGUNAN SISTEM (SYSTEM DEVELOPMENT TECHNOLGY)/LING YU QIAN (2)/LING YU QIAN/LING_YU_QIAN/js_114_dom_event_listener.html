<!DOCTYPE html>
<html>
<head>
<title>DOM Event Listener</title>
</head>
<body>

<h1>DOM Event Listener</h1>
<p>The addEventListener() method attaches an event handler to an element.</p>

<button id="myBtn">Click me</button>

<p id="demo"></p>

<script>
document.getElementById("myBtn").addEventListener("click", function() {
    document.getElementById("demo").innerHTML = "Hello World!";
});
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
