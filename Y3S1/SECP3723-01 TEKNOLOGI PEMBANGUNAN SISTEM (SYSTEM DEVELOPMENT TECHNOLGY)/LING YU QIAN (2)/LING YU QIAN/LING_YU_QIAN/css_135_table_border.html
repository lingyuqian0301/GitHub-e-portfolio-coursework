<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
table.a, th.a, td.a {
  border: 2px solid;
}

table.b, th.b, td.b {
  border: 1.5px solid;
}

table.b {
  width: 100%;
}

table.c, td.c, th.c {
  border: 1px solid;
}

table.c {
  width: 80%;
  border-collapse: collapse;
}

table.d {
  width: 90%;
  border: 2px solid;
}
</style>
</head>
<body>

<h2>Add a border to a table:</h2>

<table class="a">
  <tr class="a">
    <th class="a">Firstname</th>
    <th class="a">Lastname</th>
  </tr>
  <tr class="a">
    <td class="a">Yu Qian</td>
    <td class="a">Ling</td>
  </tr>
  <tr class="a">
    <td class="a">Jolyn</td>
    <td class="a">Yau</td>
  </tr>
</table>

<h2>Full-width Table</h2>

<table class="b">
  <tr class="b">
    <th class="b">Firstname</th>
    <th class="b">Lastname</th>
  </tr>
  <tr class="b"> 
    <td class="b">Qian</td>
    <td class="b">Ling</td>
  </tr>
  <tr class="b">
    <td class="b">Louis</td>
    <td class="b">Cheok</td>
  </tr>
</table>

<h2>Let the table borders collapse</h2>

<table class="c">
  <tr class="c">
    <th class="c">Firstname</th>
    <th class="c">Lastname</th>
  </tr>
  <tr class="c">
    <td class="c">Yu</td>
    <td class="c">Qian</td>
  </tr>
  <tr class="c">
    <td class="c">Y.Qian</td>
    <td class="c">Ling</td>
  </tr>
</table>

<h2>Single Border Around The Table</h2>

<table class="d">
  <tr>
    <th>Firstname</th>
    <th>Lastname</th>
  </tr>
  <tr>
    <td>Ling</td>
    <td>Jimmy</td>
  </tr>
  <tr>
    <td>Alex</td>
    <td>Lee</td>
  </tr>
</table>

<p><a href="index.html">Back</a></p>

</body>
</html>
