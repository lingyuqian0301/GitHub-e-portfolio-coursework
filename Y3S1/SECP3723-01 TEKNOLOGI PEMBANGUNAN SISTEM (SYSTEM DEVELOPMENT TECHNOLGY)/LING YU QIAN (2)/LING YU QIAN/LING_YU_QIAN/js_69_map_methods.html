<!DOCTYPE html>
<html>
<head>
<title>JS Map Methods</title>
</head>
<body>

<h1>JS Map Methods</h1>
<p>JavaScript Map methods for working with maps.</p>

<p id="demo"></p>

<script>
const myMap = new Map();
myMap.set("a", 1);
myMap.set("b", 2);
myMap.set("c", 3);

document.getElementById("demo").innerHTML = 
    "Size: " + myMap.size + "<br>" +
    "Get 'a': " + myMap.get("a") + "<br>" +
    "Has 'b': " + myMap.has("b");
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
