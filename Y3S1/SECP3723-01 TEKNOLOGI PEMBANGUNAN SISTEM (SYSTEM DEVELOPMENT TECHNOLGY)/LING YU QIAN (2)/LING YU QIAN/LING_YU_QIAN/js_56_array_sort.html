<!DOCTYPE html>
<html>
<head>
<title>JS Array Sort</title>
</head>
<body>

<h1>JS Array Sort</h1>
<p>The <code>sort()</code> method sorts an array alphabetically.</p>

<p id="demo"></p>

<script>
const fruits = ["Banana", "Orange", "Apple", "Mango"];

document.getElementById("demo").innerHTML = 
    "Original: " + fruits + "<br>" +
    "Sorted: " + fruits.sort();
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
