<!DOCTYPE html>
<html>
<head>
<title>JS String Methods</title>
</head>
<body>

<h1>JS String Methods</h1>
<p>JavaScript has many string methods to work with strings.</p>

<p id="demo"></p>

<script>
let text = "Hello World";
document.getElementById("demo").innerHTML = 
    "Original: " + text + "<br>" +
    "Length: " + text.length + "<br>" +
    "toUpperCase(): " + text.toUpperCase() + "<br>" +
    "toLowerCase(): " + text.toLowerCase() + "<br>" +
    "charAt(0): " + text.charAt(0);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
