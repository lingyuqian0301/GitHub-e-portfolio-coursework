<!DOCTYPE html>
<html>
<head>
<title>JS Numbers</title>
</head>
<body>

<h1>JS Numbers</h1>
<p>JavaScript has only one type of number. Numbers can be written with or without decimals.</p>

<p id="demo"></p>

<script>
let x = 3.14;
let y = 3;
let z = 123e5;

document.getElementById("demo").innerHTML = 
    "x = " + x + "<br>" +
    "y = " + y + "<br>" +
    "z = " + z;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
