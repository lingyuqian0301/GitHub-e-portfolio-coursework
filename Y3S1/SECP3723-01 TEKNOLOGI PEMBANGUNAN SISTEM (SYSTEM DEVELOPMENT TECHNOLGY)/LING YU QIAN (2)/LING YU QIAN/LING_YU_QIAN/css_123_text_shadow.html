<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
h1 {
  text-shadow: 3px 4px;
}

h1.ex1 {
  text-shadow: 2px 2px yellow;
}

h1.ex2 {
  text-shadow: 2px 2px 6px maroon;
}

h1.ex3 {
  color: white;
  text-shadow: 3px 3px 5px #000000;
}

h1.ex4 {
  text-shadow: 0 0 4px #FF0000;
}

h1.ex5 {
  text-shadow: 0 0 5px #FF0000, 0 0 5px #0000FF;
}

h1.ex6 {
  color: white;
  text-shadow: 1px 1px 3px black, 0 0 25px lightblue, 0 0 5px navy;
}
</style>
</head>
<body>

<h1>Text-shadow effect!</h1>

<h1 class="ex1">Text-shadow effect!</h1>

<h1 class=ex2>Text-shadow effect!</h1>

<h1 class="ex3">Text-shadow effect!</h1>

<h1 class="ex4">Text-shadow with red neon glow!</h1>

<h1 class="ex5">Text-shadow with red and blue neon glow!</h1>

<h1 class="ex6">Text-shadow effect!</h1>

</body>
</html>
