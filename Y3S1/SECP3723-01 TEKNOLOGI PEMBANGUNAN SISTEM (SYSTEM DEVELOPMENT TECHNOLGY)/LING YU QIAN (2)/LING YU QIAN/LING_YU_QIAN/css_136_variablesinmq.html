<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Variables in MQ</title>
  <style>
    :root{--cols:1}
    @media(min-width:700px){:root{--cols:3}}
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(var(--cols),1fr);gap:10px}
    .item{background:#f7f7f7;padding:12px}
  </style>
</head>
<body>

<h1>Variables in MQ</h1>
<div class="grid"><div class="item">A</div><div class="item">B</div><div class="item">C</div></div>
<p>CSS variables can be changed within media queries to adapt layout values.</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
