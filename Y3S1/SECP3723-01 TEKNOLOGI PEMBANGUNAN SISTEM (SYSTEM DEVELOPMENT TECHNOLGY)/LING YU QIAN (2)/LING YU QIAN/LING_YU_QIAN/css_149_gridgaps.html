<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Grid Gaps</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .g{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
    .c{background:#f9f9f9;padding:12px;border:1px solid #eee}
  </style>
</head>
<body>

<h1>Grid Gaps</h1>
<p>Use <code>gap</code> or <code>row-gap</code>/<code>column-gap</code> to control spacing between grid items.</p>
<div class="g"><div class="c">A</div><div class="c">B</div><div class="c">C</div></div>

</body>
