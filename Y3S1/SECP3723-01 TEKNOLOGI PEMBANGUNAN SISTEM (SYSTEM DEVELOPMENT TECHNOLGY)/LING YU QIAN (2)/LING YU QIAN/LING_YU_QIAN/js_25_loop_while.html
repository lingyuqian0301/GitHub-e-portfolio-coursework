<!DOCTYPE html>
<html>
<head>
<title>JS Loop while</title>
</head>
<body>

<h1>JS Loop while</h1>
<p>The <code>while</code> loop loops through a block of code as long as a specified condition is true.</p>

<p id="demo"></p>

<script>
let text = "";
let i = 0;
while (i < 5) {
    text += "The number is " + i + "<br>";
    i++;
}
document.getElementById("demo").innerHTML = text;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
