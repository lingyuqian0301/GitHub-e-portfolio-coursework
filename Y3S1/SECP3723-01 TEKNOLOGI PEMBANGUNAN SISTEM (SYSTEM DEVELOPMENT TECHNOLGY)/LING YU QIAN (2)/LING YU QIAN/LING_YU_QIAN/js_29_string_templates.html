<!DOCTYPE html>
<html>
<head>
<title>JS String Templates</title>
</head>
<body>

<h1>JS String Templates</h1>
<p>Template literals (template strings) allow you to use strings or embedded expressions in string format.</p>

<p id="demo"></p>

<script>
let firstName = "John";
let lastName = "Doe";
let text = `Welcome ${firstName}, ${lastName}!`;

document.getElementById("demo").innerHTML = text;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
