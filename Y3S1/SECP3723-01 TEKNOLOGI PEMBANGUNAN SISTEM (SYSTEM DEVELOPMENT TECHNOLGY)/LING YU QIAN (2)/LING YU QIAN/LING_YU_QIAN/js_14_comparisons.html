<!DOCTYPE html>
<html>
<head>
<title>JS Comparisons</title>
</head>
<body>

<h1>JS Comparisons</h1>
<p>JavaScript comparison operators are used in logical statements to determine equality or difference between variables or values.</p>

<p id="demo"></p>

<script>
let x = 5;
let y = 3;

document.getElementById("demo").innerHTML = 
    "x = " + x + ", y = " + y + "<br>" +
    "x == y: " + (x == y) + "<br>" +
    "x === y: " + (x === y) + "<br>" +
    "x != y: " + (x != y) + "<br>" +
    "x !== y: " + (x !== y) + "<br>" +
    "x > y: " + (x > y) + "<br>" +
    "x < y: " + (x < y) + "<br>" +
    "x >= y: " + (x >= y) + "<br>" +
    "x <= y: " + (x <= y);
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
