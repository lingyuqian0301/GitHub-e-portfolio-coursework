<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Combinators</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
  /* descendant example */
  ul li{color:#333}
  /* child example */
  ul>li{font-weight:bold}
  /* adjacent sibling */
  p + p{margin-top:0}
  </style>
</head>
<body>

<h1>CSS Combinators</h1>
<p>Combinators select elements based on relationships: descendant, child (<code>&gt;</code>), sibling (+), general sibling (~).</p>
<ul><li>Item 1</li><li>Item 2</li></ul>
<p>First paragraph.</p>
<p>Second paragraph (adjacent).</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
