<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
p.one {
  border-style: dotted;
  border-color: #ff0000; /* red */;
}

p.two {
  border-style: dotted;
  border-color: hsl(0, 0%, 73%); /* grey */
} 

p.three {
  border-style: solid;
  border-color: rgb(0, 0, 255); /* blue */
}
</style>
</head>
<body>

<h2>The border-color Property</h2>
<p>This property specifies the color of the three borders:</p>

<p class="one">A dotted red border</p>
<p class="two">A dotted grey border</p>
<p class="three">A solid blue border</p>

<p><b>Note:</b> The "border-color" property does not work if it is used alone. Use the "border-style" property to set the borders first.</p>

<p><a href="index.html">Back</a></p>

</body>
</html>
