<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Margins Example</title>
  <style>
    /* CSS Margins demo */
    body{font-family:Arial,Helvetica,sans-serif;padding:20px;color:#222}
    .box{background:#f0f0f8;padding:12px;border:1px solid #ddd}
    .m1{margin:10px}
    .m2{margin:30px}
  </style>
</head>
<body>

<h1>Margins Example</h1>
<p>Margins create space outside an element. The same property works on all block elements.</p>
<div class="box m1">Margin 10px</div>
<div class="box m2">Margin 30px</div>
<br><br><a href="index.html">Main Page</a>
</body>
</html>
