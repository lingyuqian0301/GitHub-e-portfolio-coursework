<!DOCTYPE html>
<html>
<body>

<h1>Colgroup C: Hide a Column</h1>

<table border="1" cellpadding="6">
  <colgroup>
    <col>
    <col style="display:none;">
  </colgroup>
  <tr><th>Visible</th><th>Hidden</th></tr>
  <tr><td>A</td><td>B</td></tr>
</table>

<p>Note: Some browsers may not respect display:none on col; prefer CSS on cells.</p>

<br><br><a href="index.html">Back to Main Page</a>
</body>
</html>
