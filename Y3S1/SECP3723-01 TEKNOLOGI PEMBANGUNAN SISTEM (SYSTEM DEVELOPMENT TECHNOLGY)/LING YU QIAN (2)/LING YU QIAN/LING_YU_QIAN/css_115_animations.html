<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Animations</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    @keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
    .float{display:inline-block;padding:12px;background:#fff3e0;border-radius:6px;animation:float 2s ease-in-out infinite}
  </style>
</head>
<body>

<h1>CSS Animations</h1>
<div class="float">Floating</div>
<p>Animations allow complex, repeating keyframe sequences.</p>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
