<!DOCTYPE html>
<html lang="en-US">
<head>
<style>
.dropdown {
  position: relative;
  display: inline-block;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 163px;
  box-shadow: 0px 10px 14px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown:hover .dropdown-content {
  display: block;
}

.desc {
  padding: 17px;
  text-align: center;
}
</style>
</head>
<body>

<h2>Dropdown Image</h2>
<p>Move the mouse over the image below to open the dropdown content.</p>

<div class="dropdown">
  <img src="https://www.sarahdegheselle.com/wp-content/uploads/2020/10/AdobeStock_282381041-1-1024x683.jpeg" alt="itally" width="100" height="50">
  <div class="dropdown-content">
  <img src="https://www.sarahdegheselle.com/wp-content/uploads/2020/10/AdobeStock_282381041-1-1024x683.jpeg" alt="itally" width="300" height="200">
  <div class="desc">Beautiful Itally</div>
  </div>
</div>

<p><a href="index.html">Back</a></p>

</body>
</html>
