<!DOCTYPE html>
<html>
<head>
<title>AJAX PHP</title>
</head>
<body>

<h1>AJAX PHP</h1>
<p>AJAX can be used to interact with PHP scripts on the server.</p>

<p id="demo"></p>

<button type="button" onclick="loadDoc()">Get PHP data</button>

<script>
function loadDoc() {
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
        document.getElementById("demo").innerHTML = this.responseText;
    }
    xhttp.open("GET", "demo_ajax.php", true);
    xhttp.send();
}
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
