<!DOCTYPE html>
<html>
<head>
<title>JSON vs XML</title>
</head>
<body>

<h1>JSON vs XML</h1>
<p>JSON and XML are both used to store and transport data.</p>

<p id="demo"></p>

<script>
let jsonText = '{"name":"John", "age":30}';
let xmlText = "<person><name>John</name><age>30</age></person>";

document.getElementById("demo").innerHTML = 
    "JSON: " + jsonText + "<br>" +
    "XML: " + xmlText;
</script>

<br><br><a href="index.html">Main Page</a>
</body>
</html>
