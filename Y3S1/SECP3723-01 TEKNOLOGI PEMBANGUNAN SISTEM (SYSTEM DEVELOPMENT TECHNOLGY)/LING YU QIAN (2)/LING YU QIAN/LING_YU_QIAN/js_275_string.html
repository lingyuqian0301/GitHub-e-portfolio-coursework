<!DOCTYPE html>
<html lang="en-US">
<body>

<h1>JavaScript Strings</h1>
<p>Strings are written inside quotes. You can use single or double quotes:</p>

<p id="demo3"></p>

<script>
let carName1 = "Myvi A22EK2"; // Double quotes
let carName2 = 'BMW XC60'; // Single quotes

document.getElementById("demo3").innerHTML =
carName1 + " " + carName2; 
</script>

<h1>JavaScript Strings</h1>
<h2>The length Property</h2>

<p>The length of the string is:</p>
<p id="demo7"></p>

<script>
let text = "ABCDEFGHIJKLMNOPQRSTUVWXYZertybawddouyg";
document.getElementById("demo7").innerHTML = text.length;
</script>

</body>
